<!DOCTYPE html>
<html>
<head>
    <title>Task 1: Product of Two Numbers</title>
</head>
<body>
<h2>Task 1: Product of Two Numbers</h2>
<input type="number" id="num1" placeholder="Enter first number">
<input type="number" id="num2" placeholder="Enter second number">
<button onclick="calculateProduct()">Calculate Product</button>
<div id="productOutput"></div>

<script>
function calculateProduct() {
    let firstNumber = parseFloat(document.getElementById("num1").value);
    let secondNumber = parseFloat(document.getElementById("num2").value);
    if (isNaN(firstNumber) || isNaN(secondNumber)) {
        document.getElementById("productOutput").innerText = "Please enter valid numbers.";
        return;
    }
    let product = firstNumber * secondNumber;
    document.getElementById("productOutput").innerText = "The product is: " + product;
}
</script>
</body>
</html>
